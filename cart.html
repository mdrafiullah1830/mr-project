<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart — MR Shop</title>
    <style>
        :root{--primary:#7c3aed;--accent-2:#06b6d4;--muted:#6b7280;--success:#10b981;--warning:#f59e0b}
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Poppins',Arial,sans-serif;background:linear-gradient(135deg,#f7fbff,#ffffff);color:#102a43}
        
        /* Header */
        header{background:linear-gradient(90deg,var(--primary),var(--accent-2));color:#fff;padding:14px 20px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 4px 12px rgba(12,20,30,0.08)}
        header h1{font-size:20px;margin:0}
        .brand-link{color:inherit;text-decoration:none;font-weight:700;display:inline-flex;align-items:center;gap:8px}
        .mr-logo{box-sizing:border-box;height:40px;display:block;object-fit:contain;border-radius:8px;padding:4px;border:2px solid rgba(255,255,255,0.18);background:rgba(255,255,255,0.03);box-shadow:0 6px 18px rgba(16,24,40,0.08)}
        .header-links{display:flex;gap:10px;align-items:center}
        .header-links a{color:white;text-decoration:none;padding:6px 10px;border-radius:6px;background:transparent}
        
        /* Main container */
        .container{max-width:1200px;margin:0 auto;padding:28px}
        .page-title{font-size:28px;font-weight:700;margin-bottom:28px;color:#102a43}
        
        /* Two-column layout */
        .cart-layout{display:grid;grid-template-columns:1fr 380px;gap:28px}
        
        /* Cart items section */
        .cart-items{background:white;border-radius:12px;padding:24px;box-shadow:0 8px 24px rgba(16,42,67,0.08)}
        .cart-empty{text-align:center;padding:40px;color:var(--muted)}
        .cart-empty img{width:120px;height:120px;opacity:0.5;margin-bottom:16px}
        .cart-empty p{font-size:16px;margin-bottom:12px}
        .cart-empty a{color:var(--primary);text-decoration:none;font-weight:600}
        
        /* Product item */
        .cart-item{display:grid;grid-template-columns:100px 1fr auto;gap:16px;padding:16px;border-bottom:1px solid #f0f0f0;align-items:center}
        .cart-item:last-child{border-bottom:none}
        .cart-item-image{width:100px;height:100px;border-radius:8px;object-fit:cover;background:#f3f4f6}
        .cart-item-details h3{font-size:16px;font-weight:600;margin-bottom:6px;color:#102a43}
        .cart-item-details p{font-size:14px;color:var(--muted);margin-bottom:8px}
        .stock-badge{display:inline-block;padding:4px 10px;border-radius:6px;font-size:12px;font-weight:600}
        .stock-in{background:#d1fae5;color:#065f46}
        .stock-low{background:#fef3c7;color:#92400e}
        .stock-out{background:#fee2e2;color:#991b1b}
        
        /* Quantity controls */
        .quantity-controls{display:flex;align-items:center;gap:8px}
        .qty-btn{background:#f3f4f6;border:none;width:32px;height:32px;border-radius:6px;cursor:pointer;font-weight:700;transition:all .18s}
        .qty-btn:hover{background:var(--primary);color:white}
        .qty-display{min-width:40px;text-align:center;font-weight:600}
        
        /* Price and actions */
        .cart-item-price{text-align:right}
        .price-unit{font-size:14px;color:var(--muted);margin-bottom:4px}
        .price-total{font-size:18px;font-weight:700;color:var(--primary);margin-bottom:12px}
        .item-actions{display:flex;gap:8px;flex-wrap:wrap}
        .action-btn{padding:6px 12px;border-radius:6px;border:1px solid #e6e9ee;background:white;color:#102a43;cursor:pointer;font-size:12px;font-weight:600;transition:all .18s}
        .action-btn:hover{background:var(--primary);color:white;border-color:var(--primary)}
        .action-btn.wishlist{color:var(--primary)}
        
        /* Sidebar */
        .cart-summary{background:white;border-radius:12px;padding:24px;box-shadow:0 8px 24px rgba(16,42,67,0.08);height:fit-content}
        .summary-title{font-size:18px;font-weight:700;margin-bottom:16px;color:#102a43;padding-bottom:12px;border-bottom:1px solid #f0f0f0}
        
        /* Price breakdown */
        .price-row{display:flex;justify-content:space-between;margin-bottom:12px;font-size:14px}
        .price-row.total{font-size:18px;font-weight:700;color:var(--primary);padding:12px 0;border-top:2px solid #f0f0f0;border-bottom:1px solid #f0f0f0;margin-top:12px;margin-bottom:12px}
        
        /* Coupon section */
        .coupon-section{margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid #f0f0f0}
        .coupon-label{font-size:12px;font-weight:600;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
        .coupon-input-group{display:flex;gap:6px}
        .coupon-input{flex:1;padding:8px 10px;border:1px solid #e6e9ee;border-radius:6px;font-size:13px}
        .coupon-btn{padding:8px 12px;background:var(--primary);color:white;border:none;border-radius:6px;cursor:pointer;font-weight:600;font-size:12px}
        .coupon-msg{font-size:12px;margin-top:6px;color:var(--success)}
        
        /* Delivery info */
        .delivery-section{margin-bottom:16px;padding:12px;background:#f9fafb;border-radius:8px;border-left:3px solid var(--accent-2)}
        .delivery-section h4{font-size:13px;font-weight:700;margin-bottom:6px;color:#102a43}
        .delivery-section p{font-size:12px;color:var(--muted);line-height:1.5}
        .delivery-icon{font-size:18px;margin-right:8px}
        
        /* Buttons */
        .btn{width:100%;padding:12px;border-radius:8px;border:none;font-weight:600;font-size:14px;cursor:pointer;transition:all .18s;margin-bottom:8px}
        .btn-checkout{background:linear-gradient(90deg,var(--primary),var(--accent-2));color:white}
        .btn-checkout:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(124,58,237,0.25)}
        .btn-shopping{background:white;border:2px solid var(--primary);color:var(--primary)}
        .btn-shopping:hover{background:rgba(124,58,237,0.04)}
        
        /* Responsive */
        @media (max-width:768px){
            .cart-layout{grid-template-columns:1fr;gap:16px}
            .cart-item{grid-template-columns:80px 1fr;gap:12px}
            .cart-item-image{width:80px;height:80px}
            .cart-summary{position:sticky;top:100px;z-index:50}
        }
    </style>
</head>
<body>

<header>
    <h1><a href="index.html" class="brand-link" aria-label="MR Shop home"><span style="font-size:32px">🛍️</span><img src="./assets/images/mrlogo.png" alt="MR" class="mr-logo" /></a></h1>
    <div class="header-links">
        <a href="index.html">Home</a>
        <a href="#">Back</a>
    </div>
</header>

<div class="container">
    <h2 class="page-title">🛒 Shopping Cart</h2>
    
    <div class="cart-layout">
        <!-- Cart Items -->
        <div class="cart-items" id="cartItems">
            <!-- Populated by JavaScript -->
        </div>
        
        <!-- Cart Summary -->
        <div class="cart-summary">
            <div class="summary-title">Order Summary</div>
            
            <!-- Price Breakdown -->
            <div class="price-row">
                <span>Subtotal</span>
                <span id="subtotal">৳ 0</span>
            </div>
            <div class="price-row">
                <span>Tax (5%)</span>
                <span id="tax">৳ 0</span>
            </div>
            <div class="price-row">
                <span>Shipping</span>
                <span id="shipping">৳ 0</span>
            </div>
            <div class="price-row" id="discountRow" style="display:none">
                <span>Discount</span>
                <span id="discount" style="color:var(--success)">-৳ 0</span>
            </div>
            <div class="price-row total">
                <span>Total</span>
                <span id="total">৳ 0</span>
            </div>
            
            <!-- Coupon Section -->
            <div class="coupon-section">
                <div class="coupon-label">Apply Coupon</div>
                <div class="coupon-input-group">
                    <input type="text" id="couponInput" class="coupon-input" placeholder="Enter code..." />
                    <button class="coupon-btn" onclick="applyCoupon()">Apply</button>
                </div>
                <div class="coupon-msg" id="couponMsg"></div>
            </div>
            
            <!-- Delivery Info -->
            <div class="delivery-section">
                <div><span class="delivery-icon">📦</span><strong>Standard Delivery</strong></div>
                <p>Estimated: <strong id="deliveryDate">5-7 business days</strong></p>
                <p style="margin-top:6px">Free shipping on orders over ৳ 5,000</p>
            </div>
            
            <!-- Checkout Buttons -->
            <button class="btn btn-checkout" onclick="proceedCheckout()">Proceed to Checkout</button>
            <button class="btn btn-shopping" onclick="continueShopping()">Continue Shopping</button>
        </div>
    </div>
</div>

<script>
    // Cart data (simulated; in real app, fetch from server/localStorage)
    let cartData = [
        { id: 1, name: 'Smartphone X10', price: 15999, quantity: 1, image: 'https://i.ibb.co/S6qMxwr/phone.jpg', stock: 5 },
        { id: 2, name: 'Sports Shoes', price: 2499, quantity: 2, image: 'https://i.ibb.co/fqzGyvY/shoes.jpg', stock: 12 },
        { id: 4, name: 'Digital Watch', price: 1299, quantity: 1, image: 'https://i.ibb.co/wwzCzKR/watch.jpg', stock: 0 },
    ];
    let appliedCoupon = null;
    let discountPercent = 0;

    // Coupon codes (demo)
    const COUPONS = {
        'SAVE10': { percent: 10, label: '10% off' },
        'SAVE20': { percent: 20, label: '20% off' },
        'WELCOME': { percent: 15, label: '15% off' }
    };

    // Initialize cart on page load
    document.addEventListener('DOMContentLoaded', function() {
        renderCart();
        updateCalculations();
        setDeliveryDate();
    });

    function renderCart() {
        const container = document.getElementById('cartItems');
        
        if (cartData.length === 0) {
            container.innerHTML = `
                <div class="cart-empty">
                    <div style="font-size:48px;margin-bottom:12px">🛍️</div>
                    <p>Your cart is empty</p>
                    <a href="index.html">Continue Shopping</a>
                </div>
            `;
            return;
        }

        container.innerHTML = cartData.map(item => {
            const stockStatus = item.stock === 0 ? 'out' : item.stock < 5 ? 'low' : 'in';
            const stockText = item.stock === 0 ? 'Out of Stock' : item.stock < 5 ? 'Low Stock' : 'In Stock';
            const total = item.price * item.quantity;
            
            return `
                <div class="cart-item">
                    <img src="${item.image}" alt="${item.name}" class="cart-item-image" />
                    <div class="cart-item-details">
                        <h3>${item.name}</h3>
                        <p>Price: <strong>৳ ${item.price.toLocaleString()}</strong></p>
                        <span class="stock-badge stock-${stockStatus}">${stockText}</span>
                    </div>
                    <div style="display:flex;flex-direction:column;gap:12px;align-items:center">
                        <div class="quantity-controls">
                            <button class="qty-btn" onclick="updateQuantity(${item.id}, -1)" ${item.stock === 0 ? 'disabled' : ''}>−</button>
                            <div class="qty-display">${item.quantity}</div>
                            <button class="qty-btn" onclick="updateQuantity(${item.id}, 1)" ${item.stock === 0 ? 'disabled' : ''}>+</button>
                        </div>
                        <div class="cart-item-price">
                            <div class="price-unit">Per item: ৳ ${item.price.toLocaleString()}</div>
                            <div class="price-total">৳ ${total.toLocaleString()}</div>
                        </div>
                        <div class="item-actions">
                            <button class="action-btn" onclick="removeItem(${item.id})">Remove</button>
                            <button class="action-btn" onclick="saveForLater(${item.id})">Save Later</button>
                            <button class="action-btn wishlist" onclick="addToWishlist(${item.id})">❤ Wishlist</button>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    function updateQuantity(id, change) {
        const item = cartData.find(p => p.id === id);
        if (!item) return;
        
        item.quantity = Math.max(0, item.quantity + change);
        if (item.quantity === 0) removeItem(id);
        else {
            renderCart();
            updateCalculations();
        }
    }

    function removeItem(id) {
        cartData = cartData.filter(p => p.id !== id);
        renderCart();
        updateCalculations();
    }

    function saveForLater(id) {
        alert('Item saved for later! (This would be persisted in a real app)');
    }

    function addToWishlist(id) {
        const item = cartData.find(p => p.id === id);
        if (item) alert(`"${item.name}" added to wishlist!`);
    }

    function updateCalculations() {
        const subtotal = cartData.reduce((sum, p) => sum + (p.price * p.quantity), 0);
        const tax = Math.round(subtotal * 0.05);
        const shipping = subtotal > 5000 ? 0 : 150; // Free shipping over ৳5000
        const discount = Math.round(subtotal * discountPercent / 100);
        const total = subtotal + tax + shipping - discount;

        document.getElementById('subtotal').textContent = '৳ ' + subtotal.toLocaleString();
        document.getElementById('tax').textContent = '৳ ' + tax.toLocaleString();
        document.getElementById('shipping').textContent = shipping === 0 ? 'Free' : '৳ ' + shipping;
        document.getElementById('total').textContent = '৳ ' + total.toLocaleString();

        if (discount > 0) {
            document.getElementById('discountRow').style.display = 'flex';
            document.getElementById('discount').textContent = '-৳ ' + discount.toLocaleString();
        }
    }

    function applyCoupon() {
        const code = document.getElementById('couponInput').value.toUpperCase().trim();
        const msg = document.getElementById('couponMsg');
        
        if (!code) {
            msg.textContent = 'Please enter a coupon code';
            msg.style.color = '#dc2626';
            return;
        }

        if (COUPONS[code]) {
            appliedCoupon = code;
            discountPercent = COUPONS[code].percent;
            msg.textContent = `✓ ${COUPONS[code].label} applied!`;
            msg.style.color = 'var(--success)';
            updateCalculations();
        } else {
            msg.textContent = 'Invalid coupon code';
            msg.style.color = '#dc2626';
        }
    }

    function setDeliveryDate() {
        const today = new Date();
        const deliveryDate = new Date(today.setDate(today.getDate() + 6)); // 5-7 days
        const options = { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' };
        document.getElementById('deliveryDate').textContent = deliveryDate.toLocaleDateString('en-US', options);
    }

    function proceedCheckout() {
        if (cartData.length === 0) {
            alert('Your cart is empty!');
            return;
        }
        alert(`Proceeding to checkout with ${cartData.length} item(s). (This would redirect to payment page in a real app)`);
    }

    function continueShopping() {
        window.location.href = 'index.html';
    }
</script>

</body>
</html>
