<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Food & Natural Products — MR Shop</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

    :root{
      --accent: #7c3aed;
      --accent-2: #06b6d4;
      --bg-1: #fff7fb;
      --bg-2: #f0fbff;
      --muted: #6b7280;
      --shadow: 0 10px 30px rgba(18,38,63,0.08);
    }

    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{
      font-family: 'Poppins', Arial, sans-serif;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      background: linear-gradient(135deg,var(--bg-1),var(--bg-2));
      color:#102a43;
      line-height:1.4;
    }

    /* Header */
    header{
      background: linear-gradient(90deg,var(--accent),var(--accent-2));
      color: white;
      padding: 18px 36px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      box-shadow: var(--shadow);
    }
    header h1{font-size:20px;letter-spacing:0.2px}
    .brand-link{color:inherit;text-decoration:none;font-weight:700;display:inline-flex;align-items:center;gap:8px}
    .mr-logo{height:40px;border-radius:8px;padding:4px;border:2px solid rgba(255,255,255,0.18);background:rgba(255,255,255,0.03)}

    .header-links{display:flex;gap:12px;align-items:center}
    .header-links a{color:#fff;text-decoration:none;padding:8px 12px;border-radius:8px}
    .header-links a:hover{background:rgba(255,255,255,0.15)}

    /* Page layout */
    .page-container{max-width:1200px;margin:0 auto;padding:36px 20px}
    
    /* Page title */
    .page-title{font-size:32px;font-weight:700;background:linear-gradient(90deg,var(--accent),var(--accent-2));-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:12px}
    .page-subtitle{color:var(--muted);margin-bottom:28px;font-size:14px}

    /* Product grid */
    .products-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
      gap:24px;
      margin-bottom:28px;
    }

    .product-card{
      background:#fff;
      border-radius:16px;
      overflow:hidden;
      box-shadow: var(--shadow);
      transition:.3s;
      display:flex;
      flex-direction:column;
    }

    .product-card:hover{
      transform:translateY(-8px);
      box-shadow:0 20px 50px rgba(18,38,63,0.15);
    }

    .product-image{
      width:100%;
      height:200px;
      object-fit:cover;
    }

    .product-info{padding:16px;display:flex;flex-direction:column;gap:10px}

    .product-name{font-size:16px;font-weight:700}
    .product-desc{font-size:13px;color:var(--muted)}
    .product-price{font-size:18px;font-weight:800;background:linear-gradient(90deg,var(--accent),var(--accent-2));-webkit-background-clip:text;background-clip:text;color:transparent}

    .product-actions{display:flex;gap:8px;align-items:center}

    .qty-selector{display:flex;align-items:center;border:1px solid #e6e9ee;border-radius:8px;background:#f9fafb}
    .qty-selector button{background:transparent;border:none;padding:6px 8px;cursor:pointer;font-weight:700;color:var(--muted)}
    .qty-selector input{border:none;background:transparent;width:30px;text-align:center;font-weight:600}

    .add-to-cart-btn{
      flex:1;padding:10px;
      background:linear-gradient(90deg,var(--accent),var(--accent-2));
      color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer;
    }

    footer{
      background:linear-gradient(90deg,#eef2ff,#f0f9ff);
      color:var(--muted);
      text-align:center;
      padding:28px;
      margin-top:28px;
    }

    @media (max-width:768px){
      .page-title{font-size:24px}
    }
  </style>
  <link rel="stylesheet" href="assets/css/layout.css">
</head>

<body>

  <header>
    <h1>
      <a href="index.html" class="brand-link">
        <img src="./assets/images/mrlogo.png" alt="MR" class="mr-logo" />
        <span style="font-weight:700;font-size:20px">MR Shop</span>
      </a>
    </h1>

    <div class="header-links">
      <a href="index.html">Home</a>
      <a href="javascript:history.back()">Back</a>
    </div>
  </header>

  <main class="page-container">
    <h2 class="page-title">Food & Natural Products</h2>
    <p class="page-subtitle">Fresh, organic & authentic Bengali delicacies sourced directly from producers</p>

    <div class="products-grid" id="productsGrid"></div>
  </main>

  <footer>
    © 2025 MR Shop | Fresh & Natural Products
  </footer>

  <script>
    const products = [
      { id:1,name:"Natore Kachagolla",price:280,image:"https://picsum.photos/seed/kachagolla/400/300",description:"Traditional sweet made from khoya."},
      { id:2,name:"Fresh Gur (Jaggery)",price:150,image:"https://picsum.photos/seed/gur-jaggery/400/300",description:"Organic jaggery made from sugarcane."},
      { id:3,name:"Bogura Doi",price:120,image:"https://picsum.photos/seed/bogura-doi/400/300",description:"Authentic Bogura yogurt."},
      { id:4,name:"Tangail er Chomchom",price:200,image:"https://picsum.photos/seed/chomchom/400/300",description:"Famous sweet from Tangail."},
      { id:5,name:"Dhaka er Rosogolla",price:180,image:"https://picsum.photos/seed/rosogolla/400/300",description:"Soft, spongy rasgulla from Dhaka."},
      { id:6,name:"Pure Honey",price:320,image:"https://picsum.photos/seed/honey-natural/400/300",description:"Raw, natural honey."},
    
];

    let cart = JSON.parse(localStorage.getItem('mr_shop_cart')) || [];

    function saveCart(){ localStorage.setItem('mr_shop_cart', JSON.stringify(cart)); }

    function renderProducts(){
      const grid = document.getElementById('productsGrid');
      grid.innerHTML = products.map(p => `
        <div class="product-card">
          <img src="${p.image}" class="product-image" />
          <div class="product-info">
            <h3 class="product-name">${p.name}</h3>
            <p class="product-desc">${p.description}</p>
            <div class="product-price">৳ ${p.price}</div>

            <div class="product-actions">
              <div class="qty-selector">
                <button onclick="changeQty(${p.id}, -1)">−</button>
                <input id="qty-${p.id}" value="1" readonly />
                <button onclick="changeQty(${p.id}, 1)">+</button>
              </div>

              <button class="add-to-cart-btn" onclick="addToCart(${p.id})">Add</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    function changeQty(id, d){
      const input = document.getElementById(`qty-${id}`);
      input.value = Math.max(1, Number(input.value) + d);
    }

    function addToCart(id){
      const p = products.find(x => x.id === id);
      const qty = Number(document.getElementById(`qty-${id}`).value);
      const exists = cart.find(i => i.id === id);
      if(exists) exists.quantity += qty;
      else cart.push({...p, quantity: qty});
      saveCart();
      alert(p.name + " added to cart!");
    }

    document.addEventListener('DOMContentLoaded', renderProducts);
  </script>

</body>
</html>
