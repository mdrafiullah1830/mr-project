<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found — MR Shop</title>
  <link rel="icon" href="assets/images/mrlogo.png" type="image/png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    .error-header {
      background: #131921;
      padding: 14px 20px;
      text-align: center;
    }
    .error-header a {
      color: #fff;
      font-size: 22px;
      font-weight: 800;
      text-decoration: none;
      letter-spacing: -1px;
    }
    .error-header a span { color: #ff9900; }
    .error-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .error-content {
      text-align: center;
      max-width: 500px;
    }
    .error-code {
      font-size: 120px;
      font-weight: 800;
      letter-spacing: -4px;
      background: linear-gradient(135deg, #ff9900 0%, #ffd814 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 16px;
    }
    .error-title {
      font-size: 28px;
      font-weight: 700;
      color: #1d1d1f;
      margin-bottom: 12px;
    }
    .error-desc {
      font-size: 16px;
      color: #6e6e73;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .error-btns {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .error-btn {
      padding: 14px 28px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .error-btn-primary {
      background: linear-gradient(135deg, #ff9900, #ffd814);
      color: #131921;
      box-shadow: 0 4px 12px rgba(255,153,0,0.3);
    }
    .error-btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(255,153,0,0.4);
    }
    .error-btn-secondary {
      background: #fff;
      color: #1d1d1f;
      border: 1px solid #d2d2d7;
    }
    .error-btn-secondary:hover {
      background: #f5f5f7;
      transform: translateY(-2px);
    }
    .error-footer {
      text-align: center;
      padding: 20px;
      color: #86868b;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="error-header">
    <a href="index.html">MR <span>Shop</span></a>
  </div>
  <div class="error-container">
    <div class="error-content">
      <div class="error-code">404</div>
      <h1 class="error-title">Page Not Found</h1>
      <p class="error-desc">The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
      <div class="error-btns">
        <a href="index.html" class="error-btn error-btn-primary"><i class="fas fa-home"></i> Back to Home</a>
        <a href="javascript:history.back()" class="error-btn error-btn-secondary"><i class="fas fa-arrow-left"></i> Go Back</a>
      </div>
    </div>
  </div>
  <div class="error-footer">&copy; 2026 MR Shop. All Rights Reserved.</div>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</body>
</html>
