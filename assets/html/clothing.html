<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="stylesheet" href="../css/site-base.css" />
<title>Clothing Collection — MR Shop</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

    :root{
      --accent: #7c3aed;
      --accent-2: #06b6d4;
      --bg-1: #fff7fb;
      --bg-2: #f0fbff;
      --muted: #6b7280;
      --shadow: 0 10px 30px rgba(18,38,63,0.08);
    }

    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{
      font-family: 'Poppins', Arial, sans-serif;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      background: linear-gradient(135deg,var(--bg-1),var(--bg-2));
      color:#102a43;
      line-height:1.4;
    }

    /* Header */
    header{
      background: linear-gradient(90deg,var(--accent),var(--accent-2));
      color: white;
      padding: 18px 36px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      box-shadow: var(--shadow);
    }
    header h1{font-size:20px;letter-spacing:0.2px}
    .brand-link{color:inherit;text-decoration:none;font-weight:700;display:inline-flex;align-items:center;gap:8px}
    .mr-logo{height:40px;border-radius:8px;padding:4px;border:2px solid rgba(255,255,255,0.18);background:rgba(255,255,255,0.03)}

    .header-links{display:flex;gap:12px;align-items:center}
    .header-links a{color:#fff;text-decoration:none;padding:8px 12px;border-radius:8px}
    .header-links a:hover{background:rgba(255,255,255,0.15)}

    /* Page layout */
    .page-container{max-width:1200px;margin:0 auto;padding:36px 20px}
    .page-title{font-size:32px;font-weight:700;background:linear-gradient(90deg,var(--accent),var(--accent-2));-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:12px}
    .page-subtitle{color:var(--muted);margin-bottom:28px;font-size:14px}

    /* Product grid */
    .products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:24px;margin-bottom:28px}

    .product-card{background:#fff;border-radius:16px;overflow:hidden;box-shadow: var(--shadow);transition:.3s;display:flex;flex-direction:column}
    .product-card:hover{transform:translateY(-8px);box-shadow:0 20px 50px rgba(18,38,63,0.15)}
    .product-image{width:100%;height:260px;object-fit:cover}
    .product-info{padding:16px;display:flex;flex-direction:column;gap:10px}
    .product-name{font-size:16px;font-weight:700}
    .product-desc{font-size:13px;color:var(--muted)}
    .product-price{font-size:18px;font-weight:800;background:linear-gradient(90deg,var(--accent),var(--accent-2));-webkit-background-clip:text;background-clip:text;color:transparent}
    .product-actions{display:flex;gap:8px;align-items:center}
    .qty-selector{display:flex;align-items:center;border:1px solid #e6e9ee;border-radius:8px;background:#f9fafb}
    .qty-selector button{background:transparent;border:none;padding:6px 8px;cursor:pointer;font-weight:700;color:var(--muted)}
    .qty-selector input{border:none;background:transparent;width:30px;text-align:center;font-weight:600}
    .add-to-cart-btn{flex:1;padding:10px;background:linear-gradient(90deg,var(--accent),var(--accent-2));color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer}

    footer{background:linear-gradient(90deg,#eef2ff,#f0f9ff);color:var(--muted);text-align:center;padding:28px;margin-top:28px}

    @media (max-width:768px){.page-title{font-size:24px}}
  </style>
</head>

<body>

  <header>
    <h1>
      <a href="index.html" class="brand-link">
  <img src="../images/mrlogo.png" alt="MR" class="mr-logo" />
        <span style="font-weight:700;font-size:20px">MR Shop</span>
      </a>
    </h1>

    <div class="header-links">
      <a href="index.html">Home</a>
      <a href="javascript:history.back()">Back</a>
    </div>
  </header>

  <main class="page-container">
    <h2 class="page-title">Clothing Collection</h2>
    <p class="page-subtitle">Traditional and modern garments — curated for comfort and style</p>

    <div class="products-grid" id="productsGrid"></div>
  </main>

  <footer>
    © 2025 MR Shop — Clothing
  </footer>

  <script src="../js/category-live-sync.js"></script>
  <script>
    const products = [
      { id:301, name: "Jamdani Saree", price:4500, image: "./assets/images/saree.jpg", description: "Elegant Jamdani saree with handcrafted motifs." },
      { id:302, name: "Cotton Panjabi", price:850, image: "./assets/images/panjabi.jpg", description: "Lightweight cotton panjabi for everyday wear." },
      { id:303, name: "Silk Salwar Kameez", price:2200, image: "./assets/images/salwar.jpg", description: "Graceful silk salwar kameez set for festivities." },
      { id:304, name: "Traditional Lungi", price:420, image: "./assets/images/lungi.jpg", description: "Comfortable traditional lungi in multiple colors." },
      { id:305, name: "Classic Kurta", price:1990, image: "https://picsum.photos/seed/kurta/400/300", description: "Minimalist kurta for modern occasions." }
    ];

    const CATEGORY_SLUG = 'clothing';
    let catalogProducts = products.slice();

    let cart = JSON.parse(localStorage.getItem('mr_shop_cart')) || [];
    function saveCart(){ localStorage.setItem('mr_shop_cart', JSON.stringify(cart)); }

    function renderProducts(){
      const grid = document.getElementById('productsGrid');
      const displayProducts = Array.isArray(catalogProducts) && catalogProducts.length > 0 ? catalogProducts : products;

      grid.innerHTML = displayProducts.map(p => `
        <div class="product-card" data-product-id="${p.id}" role="link" tabindex="0" aria-label="View details for ${p.name}">
          <img src="${p.image}" class="product-image" />
          <div class="product-info">
            <h3 class="product-name">${p.name}</h3>
            <p class="product-desc">${p.description}</p>
            <div class="product-price">৳ ${p.price}</div>

            <div class="product-actions">
              <div class="qty-selector">
                <button onclick="changeQty(${p.id}, -1)">−</button>
                <input id="qty-${p.id}" value="1" readonly />
                <button onclick="changeQty(${p.id}, 1)">+</button>
              </div>

              <button class="add-to-cart-btn" onclick="addToCart(${p.id})">Add</button>
            </div>

            <div style="margin-top:8px;text-align:right"><a href="product.html?id=${p.id}" style="color:var(--accent);text-decoration:none">View details →</a></div>
          </div>
        </div>
      `).join('');

      if (window.MRShopCategoryLiveSync && typeof window.MRShopCategoryLiveSync.bindProductCardNavigation === 'function') {
        window.MRShopCategoryLiveSync.bindProductCardNavigation(grid, displayProducts);
      }
    }

    function changeQty(id, d){
      const input = document.getElementById(`qty-${id}`);
      input.value = Math.max(1, Number(input.value) + d);
    }

    function addToCart(id){
      const p = catalogProducts.find(x => x.id === id) || products.find(x => x.id === id);
      const qty = Number(document.getElementById(`qty-${id}`).value);

      if (window.MRShopCartFlow && typeof window.MRShopCartFlow.addToCart === 'function') {
        const added = window.MRShopCartFlow.addToCart(p, {
          quantity: qty,
          returnUrl: window.location.href
        });

        if (added) {
          alert(p.name + ' added to cart!');
        }

        return;
      }

      const exists = cart.find(i => i.id === id);
      if(exists) exists.quantity += qty;
      else cart.push({...p, quantity: qty});
      saveCart();
      alert(p.name + " added to cart!");
    }

    async function refreshCatalog(){
      if (!window.MRShopCategoryLiveSync) {
        catalogProducts = products.slice();
        renderProducts();
        return;
      }

      const liveProducts = await window.MRShopCategoryLiveSync.loadCategoryProducts(CATEGORY_SLUG);
      catalogProducts = window.MRShopCategoryLiveSync.mergeProducts(products, liveProducts, CATEGORY_SLUG);
      renderProducts();
    }

    document.addEventListener('DOMContentLoaded', renderProducts);
    document.addEventListener('DOMContentLoaded', () => {
      refreshCatalog();
      if (window.MRShopCategoryLiveSync) {
        window.MRShopCategoryLiveSync.watchCategoryUpdates(refreshCatalog);
      }
    });
  </script>

  <script src="../js/cart-flow.js"></script>

</body>
</html>
