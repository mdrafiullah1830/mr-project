<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Orders - MR Shop</title>
    <link rel="stylesheet" href="assets/css/orders.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            color: #1a1a1a;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .filters {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 16px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: #666;
            transition: all 0.3s ease;
        }

        .filter-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .filter-btn:hover {
            border-color: #667eea;
        }

        .orders-grid {
            display: grid;
            gap: 20px;
        }

        .order-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .order-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 12px rgba(0, 0, 0, 0.15);
        }

        .order-header {
            padding: 20px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .order-id {
            font-weight: 600;
            color: #1a1a1a;
            font-size: 16px;
        }

        .order-date {
            font-size: 13px;
            color: #999;
            margin-top: 4px;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-confirmed {
            background: #e3f2fd;
            color: #1976d2;
        }

        .status-packed {
            background: #f3e5f5;
            color: #7b1fa2;
        }

        .status-shipped {
            background: #fff3e0;
            color: #e65100;
        }

        .status-out-for-delivery {
            background: #e8f5e9;
            color: #388e3c;
        }

        .status-delivered {
            background: #c8e6c9;
            color: #2e7d32;
        }

        .status-cancelled {
            background: #ffebee;
            color: #c62828;
        }

        .order-content {
            padding: 20px;
        }

        .order-items {
            margin-bottom: 20px;
        }

        .item {
            display: flex;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid #f5f5f5;
        }

        .item:last-child {
            border-bottom: none;
        }

        .item-image {
            width: 60px;
            height: 60px;
            background: #f5f5f5;
            border-radius: 6px;
            overflow: hidden;
            flex-shrink: 0;
        }

        .item-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .item-details {
            flex: 1;
        }

        .item-name {
            font-weight: 600;
            color: #1a1a1a;
            font-size: 14px;
        }

        .item-meta {
            font-size: 13px;
            color: #999;
            margin-top: 4px;
        }

        .item-price {
            font-weight: 600;
            color: #667eea;
            font-size: 14px;
        }

        .order-summary {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
            border-top: 1px solid #f0f0f0;
            margin-bottom: 15px;
        }

        .summary-left {
            display: flex;
            gap: 30px;
            flex: 1;
        }

        .summary-item {
            display: flex;
            flex-direction: column;
        }

        .summary-label {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .summary-value {
            font-weight: 600;
            color: #1a1a1a;
            font-size: 14px;
        }

        .total-amount {
            font-size: 18px;
            color: #667eea;
            font-weight: 700;
        }

        .order-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #f0f0f0;
        }

        .btn {
            flex: 1;
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            text-align: center;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #1a1a1a;
            border: 1px solid #e0e0e0;
        }

        .btn-secondary:hover {
            background: #e8e8e8;
        }

        .timeline {
            margin-top: 20px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 8px;
        }

        .timeline-title {
            font-weight: 600;
            color: #1a1a1a;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .timeline-track {
            position: relative;
            padding: 0 0 0 30px;
        }

        .timeline-item {
            position: relative;
            margin-bottom: 15px;
            padding-bottom: 15px;
        }

        .timeline-item:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .timeline-dot {
            position: absolute;
            left: -25px;
            top: 0;
            width: 12px;
            height: 12px;
            background: #ddd;
            border-radius: 50%;
            border: 3px solid white;
            transition: all 0.3s ease;
        }

        .timeline-item.completed .timeline-dot {
            background: #667eea;
        }

        .timeline-item.current .timeline-dot {
            background: #667eea;
            box-shadow: 0 0 0 8px rgba(102, 126, 234, 0.1);
        }

        .timeline-line {
            position: absolute;
            left: -19px;
            top: 12px;
            width: 2px;
            height: calc(100% + 15px);
            background: #e0e0e0;
        }

        .timeline-item.completed .timeline-line {
            background: #667eea;
        }

        .timeline-item:last-child .timeline-line {
            display: none;
        }

        .timeline-text {
            padding-top: 2px;
        }

        .timeline-stage {
            font-weight: 600;
            color: #1a1a1a;
            font-size: 13px;
            text-transform: capitalize;
        }

        .timeline-date {
            font-size: 12px;
            color: #999;
            margin-top: 2px;
        }

        .timeline-description {
            font-size: 13px;
            color: #666;
            margin-top: 4px;
        }

        .empty-state {
            background: white;
            border-radius: 12px;
            padding: 60px 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .empty-title {
            font-size: 20px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 8px;
        }

        .empty-text {
            color: #999;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .btn-empty {
            padding: 10px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-empty:hover {
            background: #5568d3;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 25px rgba(0, 0, 0, 0.15);
        }

        .modal-header {
            font-size: 20px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            color: #999;
            cursor: pointer;
        }

        /* Navigation Header */
        .nav-header {
            background: linear-gradient(90deg, #7c3aed, #06b6d4);
            color: white;
            padding: 18px 36px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            box-shadow: 0 10px 30px rgba(18, 38, 63, 0.08);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-header h1 {
            font-size: 20px;
            letter-spacing: 0.2px;
            margin: 0;
        }

        .brand-link {
            color: inherit;
            text-decoration: none;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .brand-link:focus {
            outline: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 6px;
            padding: 4px;
        }

        .mr-logo {
            box-sizing: border-box;
            height: 40px;
            width: auto;
            display: block;
            object-fit: contain;
            border-radius: 8px;
            padding: 4px;
            border: 2px solid rgba(255, 255, 255, 0.18);
            background: rgba(255, 255, 255, 0.03);
            box-shadow: 0 6px 18px rgba(16, 24, 40, 0.08);
        }

        .nav-back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            padding: 8px 12px;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .nav-back-link:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(-2px);
        }

        .nav-back-btn {
            background: transparent;
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            font-size: 16px;
        }

        .nav-back-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateX(-2px);
        }

        .nav-icon {
            font-size: 18px;
        }

        @media (max-width: 768px) {
            .nav-header {
                padding: 10px 18px;
            }

            .nav-back-link {
                font-size: 14px;
            }

            .header {
                padding: 20px;
            }

            .header h1 {
                font-size: 22px;
            }

            .order-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }

            .status-badge {
                align-self: flex-start;
            }

            .summary-left {
                flex-direction: column;
                gap: 15px;
            }

            .order-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation Header -->
    <header class="nav-header">
    <h1><a href="index.html" class="brand-link" aria-label="MR Shop home" style="display:flex;align-items:center;gap:8px"><span style="font-size:32px">🛍️</span><img src="../images/mrlogo.png" alt="MR" class="mr-logo" /><span style="font-weight:700;font-size:20px;color:#fff">MR Shop</span></a></h1>
        <div style="display:flex;align-items:center;gap:12px">
            <button class="nav-back-btn" onclick="history.back()" aria-label="Go back" title="Go back">
                <span class="nav-icon">←</span>
            </button>
            <a href="index.html" class="nav-back-link" id="navLink">
                <span class="nav-text" id="navText">Home</span>
            </a>
        </div>
    </header>

    <div class="container">
        <div class="header">
            <h1>📦 My Orders</h1>
            <p>Track your orders and manage purchases</p>
            <div class="filters">
                <button class="filter-btn active" onclick="filterOrders('all')">All Orders</button>
                <button class="filter-btn" onclick="filterOrders('confirmed')">Confirmed</button>
                <button class="filter-btn" onclick="filterOrders('shipped')">Shipped</button>
                <button class="filter-btn" onclick="filterOrders('out-for-delivery')">In Transit</button>
                <button class="filter-btn" onclick="filterOrders('delivered')">Delivered</button>
            </div>
        </div>

        <div id="ordersContainer" class="orders-grid">
            <div class="empty-state">
                <div class="empty-icon">⏳</div>
                <div class="empty-title">Loading orders...</div>
                <div class="empty-text">Please wait while we fetch your orders</div>
            </div>
        </div>
    </div>

    <!-- Order Timeline Modal -->
    <div id="timelineModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                Order Timeline
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <div id="timelineContent"></div>
        </div>
    </div>

    <script>
        let allOrders = [];
        let currentFilter = 'all';

        // Check if user is logged in and update navigation
        function initializeNavigation() {
            const userData = localStorage.getItem('mr_shop_user');
            const navLink = document.getElementById('navLink');
            const navText = document.getElementById('navText');

            if (userData) {
                // User is logged in - show "Back to My Profile"
                navLink.href = 'userprofile.html';
                navText.textContent = 'Back to My Profile';
                navLink.title = 'Return to your profile';
            } else {
                // User is not logged in - show "Home"
                navLink.href = 'index.html';
                navText.textContent = 'Home';
                navLink.title = 'Return to home page';
            }
        }

        // Fetch orders on page load
        document.addEventListener('DOMContentLoaded', async () => {
            initializeNavigation();
            await loadOrders();
        });

        async function loadOrders() {
            try {
                const response = await fetch('http://localhost:5010/api/orders');
                const data = await response.json();

                if (data.success) {
                    allOrders = data.data.orders || [];
                    renderOrders(allOrders);
                } else {
                    showEmpty('Failed to load orders. Please try again.');
                }
            } catch (error) {
                console.error('[Orders] Error loading orders:', error);
                showEmpty('Unable to load orders. Please refresh the page.');
            }
        }

        function renderOrders(orders) {
            const container = document.getElementById('ordersContainer');

            if (orders.length === 0) {
                showEmpty('No orders found. Start shopping now!');
                return;
            }

            container.innerHTML = orders.map(order => `
                <div class="order-card">
                    <div class="order-header">
                        <div>
                            <div class="order-id">Order #${order.id}</div>
                            <div class="order-date">${formatDate(order.created_at)}</div>
                        </div>
                        <span class="status-badge status-${order.status}">
                            ${formatStatus(order.status)}
                        </span>
                    </div>

                    <div class="order-content">
                        <div class="order-items">
                            ${order.items.map(item => `
                                <div class="item">
                                    <div class="item-image">
                                        <img src="${item.image || 'assets/images/placeholder.png'}" alt="${item.name}" />
                                    </div>
                                    <div class="item-details">
                                        <div class="item-name">${item.name}</div>
                                        <div class="item-meta">Qty: ${item.quantity} × ৳${item.price}</div>
                                    </div>
                                    <div class="item-price">৳${(item.quantity * item.price).toLocaleString()}</div>
                                </div>
                            `).join('')}
                        </div>

                        <div class="order-summary">
                            <div class="summary-left">
                                <div class="summary-item">
                                    <span class="summary-label">Payment</span>
                                    <span class="summary-value">${formatPaymentMethod(order.payment_method)}</span>
                                </div>
                                <div class="summary-item">
                                    <span class="summary-label">Tracking ID</span>
                                    <span class="summary-value" style="font-family: monospace; font-size: 12px;">${order.tracking_id}</span>
                                </div>
                            </div>
                            <div class="summary-item">
                                <span class="summary-label">Total</span>
                                <span class="total-amount">৳${order.total.toLocaleString()}</span>
                            </div>
                        </div>

                        ${order.timeline && order.timeline.length > 0 ? `
                            <div class="timeline">
                                <div class="timeline-title">📍 Delivery Status</div>
                                <div class="timeline-track">
                                    ${renderTimeline(order)}
                                </div>
                            </div>
                        ` : ''}

                        <div class="order-actions">
                            <button class="btn btn-primary" onclick="viewTimeline('${order.id}')">
                                📍 Track Order
                            </button>
                            <button class="btn btn-secondary" onclick="contactSeller('${order.id}')">
                                💬 Contact Seller
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderTimeline(order) {
            const stages = ['confirmed', 'packed', 'shipped', 'out-for-delivery', 'delivered'];
            const completedStages = order.timeline.map(t => t.stage);

            return stages.map(stage => {
                const timelineEntry = order.timeline.find(t => t.stage === stage);
                const isCompleted = completedStages.includes(stage);
                const isCurrent = isCompleted && stage === completedStages[completedStages.length - 1];

                return `
                    <div class="timeline-item ${isCompleted ? 'completed' : ''} ${isCurrent ? 'current' : ''}">
                        <div class="timeline-line"></div>
                        <div class="timeline-dot"></div>
                        <div class="timeline-text">
                            <div class="timeline-stage">${formatStage(stage)}</div>
                            ${timelineEntry ? `
                                <div class="timeline-date">${formatDate(timelineEntry.date)}</div>
                                <div class="timeline-description">${timelineEntry.description}</div>
                            ` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function filterOrders(status) {
            currentFilter = status;

            // Update active button
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            // Filter and render
            const filtered = status === 'all'
                ? allOrders
                : allOrders.filter(o => o.status === status);

            renderOrders(filtered);
        }

        function viewTimeline(orderId) {
            const order = allOrders.find(o => o.id === orderId);
            if (!order) return;

            const modalContent = document.getElementById('timelineContent');
            modalContent.innerHTML = `
                <div style="padding: 0 15px;">
                    <div style="margin-bottom: 20px;">
                        <div class="summary-label">Order ID</div>
                        <div class="summary-value">${order.id}</div>
                    </div>
                    <div style="margin-bottom: 20px;">
                        <div class="summary-label">Tracking ID</div>
                        <div class="summary-value" style="font-family: monospace;">${order.tracking_id}</div>
                    </div>
                    <div style="margin-bottom: 20px;">
                        <div class="timeline">
                            <div class="timeline-title">Complete Timeline</div>
                            <div class="timeline-track">
                                ${renderTimeline(order)}
                            </div>
                        </div>
                    </div>
                    <div style="margin-bottom: 20px;">
                        <div class="summary-label">Shipping Address</div>
                        <div class="summary-value">
                            ${order.shipping_address.name}<br>
                            ${order.shipping_address.address}<br>
                            ${order.shipping_address.phone}
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('timelineModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('timelineModal').classList.remove('show');
        }

        function contactSeller(orderId) {
            alert('📱 Seller contact feature coming soon!\n\nOrder: ' + orderId);
        }

        function showEmpty(message) {
            const container = document.getElementById('ordersContainer');
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">📭</div>
                    <div class="empty-title">No Orders</div>
                    <div class="empty-text">${message}</div>
                    <button class="btn-empty" onclick="location.href='index.html'">
                        Continue Shopping
                    </button>
                </div>
            `;
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diffMs = now - date;
            const diffMins = Math.floor(diffMs / 60000);
            const diffHours = Math.floor(diffMs / 3600000);
            const diffDays = Math.floor(diffMs / 86400000);

            if (diffMins < 1) return 'Just now';
            if (diffMins < 60) return `${diffMins}m ago`;
            if (diffHours < 24) return `${diffHours}h ago`;
            if (diffDays < 7) return `${diffDays}d ago`;

            return date.toLocaleDateString('en-US', {
                month: 'short',
                day: 'numeric',
                year: date.getFullYear() !== now.getFullYear() ? 'numeric' : undefined
            });
        }

        function formatStatus(status) {
            const map = {
                'confirmed': '✓ Confirmed',
                'packed': '📦 Packed',
                'shipped': '🚚 Shipped',
                'out-for-delivery': '🏃 In Transit',
                'delivered': '✅ Delivered',
                'cancelled': '❌ Cancelled'
            };
            return map[status] || status;
        }

        function formatStage(stage) {
            const map = {
                'confirmed': 'Order Confirmed',
                'packed': 'Packed',
                'shipped': 'Shipped',
                'out-for-delivery': 'Out for Delivery',
                'delivered': 'Delivered'
            };
            return map[stage] || stage;
        }

        function formatPaymentMethod(method) {
            const map = {
                'bkash': '🏦 bKash',
                'nagad': '📱 Nagad',
                'cod': '💵 Cash on Delivery',
                'card': '💳 Card'
            };
            return map[method] || method;
        }

        // Close modal when clicking outside
        document.getElementById('timelineModal').addEventListener('click', (e) => {
            if (e.target.id === 'timelineModal') {
                closeModal();
            }
        });
